<!-- Login page: no sidebar/shell, just the router outlet -->
<ng-container *ngIf="!isAuthenticated; else appShell">
  <router-outlet />
</ng-container>

<!-- Authenticated app shell -->
<ng-template #appShell>

  <!-- Mobile hamburger -->
  <button class="hamburger" (click)="toggleMenu()" aria-label="Toggle menu">
    <svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
      <path stroke-linecap="round" stroke-linejoin="round" d="M4 6h16M4 12h16M4 18h16"/>
    </svg>
  </button>

  <!-- Mobile overlay -->
  <div class="sidebar-overlay" [class.active]="menuOpen" (click)="closeMenu()"></div>

  <div class="layout">
    <aside class="sidebar" [class.open]="menuOpen">
      <div class="sidebar-brand">
        <div class="brand-icon">IV</div>
        <div>
          <div class="brand-name">InvoiceApp</div>
          <div class="brand-sub">Management</div>
        </div>
      </div>

      <nav class="sidebar-nav">
        <div class="nav-group-label">Overview</div>

        <a class="nav-item" routerLink="/clients" routerLinkActive="active" (click)="closeMenu()">
          <svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.8">
            <path stroke-linecap="round" stroke-linejoin="round" d="M17 20h5v-2a3 3 0 00-5.356-1.857M17 20H7m10 0v-2c0-.656-.126-1.283-.356-1.857M7 20H2v-2a3 3 0 015.356-1.857M7 20v-2c0-.656.126-1.283.356-1.857m0 0a5.002 5.002 0 019.288 0M15 7a3 3 0 11-6 0 3 3 0 016 0z"/>
          </svg>
          <span class="nav-label">Clients</span>
        </a>

        <a class="nav-item" routerLink="/invoices" routerLinkActive="active" (click)="closeMenu()">
          <svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.8">
            <path stroke-linecap="round" stroke-linejoin="round" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"/>
          </svg>
          <span class="nav-label">Invoices</span>
        </a>

        <div class="nav-group-label">Actions</div>

        <a class="nav-item" routerLink="/invoices/create" routerLinkActive="active" (click)="closeMenu()">
          <svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.8">
            <path stroke-linecap="round" stroke-linejoin="round" d="M12 4v16m8-8H4"/>
          </svg>
          <span class="nav-label">New Invoice</span>
        </a>

        <a class="nav-item" routerLink="/invoices/import" routerLinkActive="active" (click)="closeMenu()">
          <svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.8">
            <path stroke-linecap="round" stroke-linejoin="round" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-8l-4-4m0 0L8 8m4-4v12"/>
          </svg>
          <span class="nav-label">Import</span>
        </a>
      </nav>

      <div class="sidebar-footer">
        <div class="footer-email">{{ userEmail }}</div>
        <button class="logout-btn" (click)="logout()">
          <svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.8">
            <path stroke-linecap="round" stroke-linejoin="round" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"/>
          </svg>
          Sign out
        </button>
      </div>
    </aside>

    <div class="main-content">
      <router-outlet />
    </div>
  </div>

</ng-template>
